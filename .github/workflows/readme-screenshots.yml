name: Capture Windows README screenshots

on:
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install --no-save playwright@1.55.0
      - run: npx playwright install --with-deps chromium
      - name: Start development server
        run: |
          npm exec vite -- --host 127.0.0.1 --port 4173 > /tmp/pandora-vite.log 2>&1 &
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/ > /dev/null && exit 0
            sleep 1
          done
          cat /tmp/pandora-vite.log
          exit 1
      - run: node scripts/capture-windows-readme.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: windows-readme-screenshots
          path: screenshot-output/*.png
          if-no-files-found: error
